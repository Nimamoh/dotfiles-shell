# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

# Emoji shortcodes (gemoji names, e.g. ":smile:" -> 😄) are enabled by the
# "all-emojis" package from the Espanso Hub. Since espanso resolves relative
# "imports:" paths against this file's real (post-symlink) location, an
# import here can't reach match/packages/ which lives outside the repo. See
# README for the (untracked, per-machine) setup step instead.

matches:
  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%m/%d/%Y"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/

  # Lenny face
  # force_mode: clipboard because these combining/CJK characters can't be
  # typed via key injection on Wayland (no XTest-style keycode remapping),
  # so we fall back to clipboard paste instead.
  - trigger: ":lf"
    replace: "( ͡° ͜ʖ ͡°)"
    force_mode: clipboard

  # Shrug
  - trigger: ":sf"
    replace: '¯\_(ツ)_/¯'
    force_mode: clipboard

  # Table flip
  - trigger: ":tf"
    replace: "(┛ಠ_ಠ)┛彡┻━┻"
    force_mode: clipboard
